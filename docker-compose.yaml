version: '3.8'

services:
  wings-server:
    build: ./server
    container_name: wings-core-server
    ports:
      - "5000:5000"
    environment:
      - WINGS_ADMIN_TOKEN=wings-secret-change-me
      - WINGS_SERVER_PORT=5000
    volumes:
      - wings_data:/app/wings_storage
    restart: always

volumes:
  wings_data: